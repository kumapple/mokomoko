<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>課題管理マネージャー</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f4f7f6; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; }
        .input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        input, textarea, button { padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        textarea { grid-column: span 2; height: 60px; }
        button { grid-column: span 2; background-color: #28a745; color: white; cursor: pointer; border: none; font-weight: bold; }
        button:hover { background-color: #218838; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f8f9fa; color: #555; }
        .overdue { color: red; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>📚 課題管理リスト</h1>
    
    <!-- 入力エリア -->
    <div class="input-group">
        <input type="text" id="courseName" placeholder="授業名">
        <input type="text" id="title" placeholder="課題のタイトル">
        <input type="datetime-local" id="deadline">
        <textarea id="content" placeholder="課題の内容・メモ"></textarea>
        <button onclick="addTask()">課題を追加する</button>
    </div>

    <!-- 表示エリア -->
    <table>
        <thead>
            <tr>
                <th>期限</th>
                <th>授業名</th>
                <th>タイトル</th>
                <th>内容</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody id="taskList"></tbody>
    </table>
</div>

<script>
    let tasks = [];

    function addTask() {
        const courseName = document.getElementById('courseName').value;
        const title = document.getElementById('title').value;
        const deadline = document.getElementById('deadline').value;
        const content = document.getElementById('content').value;

        if (!title || !deadline) {
            alert("タイトルと期限は必須です！");
            return;
        }

        const task = {
            id: Date.now(),
            courseName,
            title,
            deadline: new Date(deadline),
            content
        };

        tasks.push(task);
        updateDisplay();
        
        // フォームをリセット
        document.querySelectorAll('input, textarea').forEach(el => el.value = '');
    }

    function deleteTask(id) {
        tasks = tasks.filter(t => t.id !== id);
        updateDisplay();
    }

    function updateDisplay() {
        const list = document.getElementById('taskList');
        list.innerHTML = '';

        // 期限順にソート（昇順）
        tasks.sort((a, b) => a.deadline - b.deadline);

        tasks.forEach(task => {
            const row = document.createElement('tr');
            const now = new Date();
            const deadlineStr = task.deadline.toLocaleString('ja-JP', {
                year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit'
            });

            // 期限切れチェック
            const isOverdue = task.deadline < now ? 'class="overdue"' : '';

            row.innerHTML = `
                <td ${isOverdue}>${deadlineStr}</td>
                <td>${task.courseName}</td>
                <td>${task.title}</td>
                <td>${task.content}</td>
                <td><button onclick="deleteTask(${task.id})" style="background:#dc3545; width:auto; padding:5px 10px;">削除</button></td>
            `;
            list.appendChild(row);
        });
    }
</script>

</body>
</html>
