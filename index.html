<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ちきゅう防衛軍風・バケットリスト</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons for nice UI -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen pb-12">

    <div class="max-w-2xl mx-auto px-4 pt-8">
        <!-- ヘッダー -->
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-2xl font-bold text-slate-900 flex items-center gap-2">
                    <i data-lucide="sparkles" class="text-amber-500"></i> 死ぬまでにやりたいこと
                </h1>
                <p class="text-xs text-slate-500 mt-1">とりあえず入れて、期限が来たら勝手に移動</p>
            </div>
            
            <!-- 共有・閲覧モード切り替え -->
            <div class="flex items-center bg-white border border-slate-200 rounded-lg p-1 shadow-sm">
                <button id="btn-edit-mode" onclick="setMode('edit')" class="px-3 py-1.5 text-xs font-medium rounded-md flex items-center gap-1 transition-colors bg-indigo-50 text-indigo-700">
                    <i data-lucide="pencil" class="w-3.5 h-3.5"></i> 編集・追加
                </button>
                <button id="btn-share-mode" onclick="setMode('share')" class="px-3 py-1.5 text-xs font-medium rounded-md flex items-center gap-1 transition-colors text-slate-600 hover:text-slate-900">
                    <i data-lucide="eye" class="w-3.5 h-3.5"></i> 友達に見せる
                </button>
            </div>
        </div>

        <!-- 追加フォーム (編集モード時のみ表示) -->
        <div id="input-form" class="bg-white border border-slate-200 rounded-xl p-4 shadow-sm mb-6">
            <div class="flex flex-col gap-3">
                <input type="text" id="todo-text" placeholder="例：オーロラを見に行く、富士山に登る" class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
                
                <div class="flex gap-2 items-center">
                    <div class="flex-1 flex items-center gap-2 bg-slate-50 border border-slate-200 rounded-lg px-3 py-1.5">
                        <label for="todo-deadline" class="text-xs text-slate-500 whitespace-nowrap flex items-center gap-1">
                            <i data-lucide="calendar" class="w-3.5 h-3.5"></i> 期限：
                        </label>
                        <input type="month" id="todo-deadline" class="bg-transparent text-sm w-full focus:outline-none">
                    </div>
                    <button onclick="addTodo()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium text-sm px-4 py-2 rounded-lg flex items-center gap-1 shadow-sm transition-colors shrink-0">
                        <i data-lucide="plus" class="w-4 4-4"></i> 追加
                    </button>
                </div>
            </div>
        </div>

        <!-- タブ切り替え -->
        <div class="flex border-b border-slate-200 mb-4 text-sm font-medium">
            <button id="tab-active" onclick="switchTab('active')" class="flex-1 text-center py-2.5 border-b-2 border-indigo-600 text-indigo-600 transition-all flex items-center justify-center gap-1">
                挑戦中 <span id="count-active" class="bg-indigo-100 text-indigo-700 text-xs px-2 py-0.5 rounded-full font-bold">0</span>
            </button>
            <button id="tab-completed" onclick="switchTab('completed')" class="flex-1 text-center py-2.5 border-b-2 border-transparent text-slate-500 hover:text-slate-700 transition-all flex items-center justify-center gap-1">
                達成！ <span id="count-completed" class="bg-emerald-100 text-emerald-700 text-xs px-2 py-0.5 rounded-full font-bold">0</span>
            </button>
            <button id="tab-expired" onclick="switchTab('expired')" class="flex-1 text-center py-2.5 border-b-2 border-transparent text-slate-500 hover:text-slate-700 transition-all flex items-center justify-center gap-1">
                期限切れ <span id="count-expired" class="bg-rose-100 text-rose-700 text-xs px-2 py-0.5 rounded-full font-bold">0</span>
            </button>
        </div>

        <!-- リスト表示エリア -->
        <div id="todo-list" class="space-y-2.5">
            <!-- JSで動的に生成されます -->
        </div>
    </div>

    <script>
        // データ構造の初期化
        let todos = JSON.parse(localStorage.getItem('bucket_list_items')) || [];
        let currentTab = 'active'; // active, completed, expired
        let currentMode = 'edit'; // edit, share

        // 起動時処理
        function init() {
            lucide.createIcons();
            render();
        }

        // 新しいやりたいことを追加
        function addTodo() {
            const textInput = document.getElementById('todo-text');
            const deadlineInput = document.getElementById('todo-deadline');

            if (!textInput.value.trim()) return;

            const newItem = {
                id: Date.now().toString(),
                text: textInput.value.trim(),
                deadline: deadlineInput.value || null, // YYYY-MM
                completed: false,
                createdAt: new Date().toISOString()
            };

            todos.push(newItem);
            saveData();
            
            // フォームクリア
            textInput.value = '';
            deadlineInput.value = '';
            render();
        }

        // データの状態（期限切れかどうか）を自動判定して描画
        function render() {
            const listContainer = document.getElementById('todo-list');
            listContainer.innerHTML = '';

            const now = new Date();
            const currentYearMonth = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;

            // カウント用変数
            let counts = { active: 0, completed: 0, expired: 0 };

            // 振り分け処理
            const processedTodos = todos.map(todo => {
                let status = 'active';
                if (todo.completed) {
                    status = 'completed';
                } else if (todo.deadline && todo.deadline < currentYearMonth) {
                    status = 'expired';
                }
                counts[status]++;
                return { ...todo, status };
            });

            // バッジ数の更新
            document.getElementById('count-active').innerText = counts.active;
            document.getElementById('count-completed').innerText = counts.completed;
            document.getElementById('count-expired').innerText = counts.expired;

            // 現在のタブに該当するアイテムをフィルタリング
            const filtered = processedTodos.filter(todo => todo.status === currentTab);

            if (filtered.length === 0) {
                listContainer.innerHTML = `
                    <div class="text-center py-12 text-slate-400 text-sm">
                        <i data-lucide="clipboard-list" class="w-8 h-8 mx-auto mb-2 opacity-50"></i>
                        アイテムがありません
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            // アイテムの生成
            filtered.forEach(todo => {
                const itemDiv = document.createElement('div');
                itemDiv.className = `flex items-center justify-between bg-white border border-slate-200 rounded-xl p-4 shadow-sm transition-all ${todo.completed ? 'opacity-60' : ''}`;

                // 左側：チェックボックスとテキスト
                const leftSide = document.createElement('div');
                leftSide.className = "flex items-center gap-3 flex-1 min-w-0";

                if (currentMode === 'edit') {
                    const checkbox = document.createElement('input');
                    checkbox.type = "checkbox";
                    checkbox.checked = todo.completed;
                    checkbox.className = "w-5 h-5 rounded border-slate-300 text-indigo-600 focus:ring-indigo-500 cursor-pointer shrink-0";
                    checkbox.onclick = () => toggleComplete(todo.id);
                    leftSide.appendChild(checkbox);
                } else {
                    // 友達共有モードの時はアイコン表示
                    const icon = document.createElement('div');
                    icon.className = todo.completed ? "text-emerald-500 shrink-0" : "text-slate-300 shrink-0";
                    icon.innerHTML = todo.completed ? '<i data-lucide="check-circle-2" class="w-5 h-5"></i>' : '<i data-lucide="circle" class="w-5 h-5"></i>';
                    leftSide.appendChild(icon);
                }

                const textBlock = document.createElement('div');
                textBlock.className = "min-w-0 flex-1";
                
                const titleP = document.createElement('p');
                titleP.className = `text-sm font-medium text-slate-800 break-words ${todo.completed ? 'line-through text-slate-400' : ''}`;
                titleP.innerText = todo.text;
                textBlock.appendChild(titleP);

                // 期限表示ラベル
                if (todo.deadline) {
                    const deadlineSpan = document.createElement('span');
                    const [year, month] = todo.deadline.split('-');
                    
                    if (todo.status === 'expired') {
                        deadlineSpan.className = "inline-flex items-center gap-1 text-[11px] font-medium text-rose-600 bg-rose-50 px-2 py-0.5 rounded mt-1";
                        deadlineSpan.innerHTML = `<i data-lucide="alert-circle" class="w-3 h-3"></i> ${year}年${month}月（期限切れ）`;
                    } else if (todo.status === 'completed') {
                        deadlineSpan.className = "inline-flex items-center gap-1 text-[11px] font-medium text-slate-400 bg-slate-100 px-2 py-0.5 rounded mt-1";
                        deadlineSpan.innerHTML = `<i data-lucide="calendar" class="w-3 h-3"></i> 目標：${year}年${month}月`;
                    } else {
                        deadlineSpan.className = "inline-flex items-center gap-1 text-[11px] font-medium text-indigo-600 bg-indigo-50 px-2 py-0.5 rounded mt-1";
                        deadlineSpan.innerHTML = `<i data-lucide="clock" class="w-3 h-3"></i> 期限：${year}年${month}月まで`;
                    }
                    textBlock.appendChild(deadlineSpan);
                }
                leftSide.appendChild(textBlock);

                itemDiv.appendChild(leftSide);

                // 右側：削除ボタン（編集モード時のみ）
                if (currentMode === 'edit') {
                    const deleteBtn = document.createElement('button');
                    deleteBtn.className = "text-slate-400 hover:text-rose-600 p-1 rounded-md hover:bg-slate-50 transition-colors ml-2 shrink-0";
                    deleteBtn.onclick = () => deleteTodo(todo.id);
                    deleteBtn.innerHTML = '<i data-lucide="trash-2" class="w-4 h-4"></i>';
                    itemDiv.appendChild(deleteBtn);
                }

                listContainer.appendChild(itemDiv);
            });

            lucide.createIcons();
        }

        // 完了状態の切り替え
        function toggleComplete(id) {
            todos = todos.map(todo => todo.id === id ? { ...todo, completed: !todo.completed } : todo);
            saveData();
            render();
        }

        // アイテムの削除
        function deleteTodo(id) {
            if (confirm('このアイテムを削除しますか？')) {
                todos = todos.filter(todo => todo.id !== id);
                saveData();
                render();
            }
        }

        // タブ切り替え
        function switchTab(tab) {
            currentTab = tab;
            
            // タブのUIアクティブ状態を切り替え
            ['active', 'completed', 'expired'].forEach(t => {
                const btn = document.getElementById(`tab-${t}`);
                if (t === tab) {
                    btn.classList.remove('border-transparent', 'text-slate-500');
                    btn.classList.add('border-indigo-600', 'text-indigo-600');
                } else {
                    btn.classList.remove('border-indigo-600', 'text-indigo-600');
                    btn.classList.add('border-transparent', 'text-slate-500');
                }
            });

            render();
        }

        // モード切り替え（編集 vs 友達に見せる）
        function setMode(mode) {
            currentMode = mode;
            const btnEdit = document.getElementById('btn-edit-mode');
            const btnShare = document.getElementById('btn-share-mode');
            const inputForm = document.getElementById('input-form');

            if (mode === 'edit') {
                btnEdit.className = "px-3 py-1.5 text-xs font-medium rounded-md flex items-center gap-1 transition-colors bg-indigo-50 text-indigo-700";
                btnShare.className = "px-3 py-1.5 text-xs font-medium rounded-md flex items-center gap-1 transition-colors text-slate-600 hover:text-slate-900";
                inputForm.style.display = 'block';
            } else {
                btnEdit.className = "px-3 py-1.5 text-xs font-medium rounded-md flex items-center gap-1 transition-colors text-slate-600 hover:text-slate-900";
                btnShare.className = "px-3 py-1.5 text-xs font-medium rounded-md flex items-center gap-1 transition-colors bg-indigo-50 text-indigo-700";
                inputForm.style.display = 'none';
            }

            render();
        }

        // ローカルストレージに保存
        function saveData() {
            localStorage.setItem('bucket_list_items', JSON.stringify(todos));
        }

        // 初期化実行
        window.onload = init;
    </script>
</body>
</html>
